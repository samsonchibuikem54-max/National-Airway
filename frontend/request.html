</head>

<body>

    class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="sr-only">Loading...</span>
    </div>
  </div>




  <nav class="navbar navbar-expand-lg bg-white navbar-light shadow border-top border-5 border-primary sticky-top p-0">

        NATIONAL AIRWAY DELIVERY COMPANY

    </a>
    <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
      <div class="navbar-nav ms-auto p-4 p-lg-0">
        <a href="index.html" class="nav-item nav-link">Home</a>

          <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown">Pages</a>

      <h4 class="m-0 pe-lg-5 d-none d-lg-block"><i class="fa fa-headphones text-primary me-3"></i>+13864174481
      </h4>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow-lg border-0 rounded-3">

      <h3 class="text-center mb-2">Request Shipment Quote</h3>
      <p class="text-center text-muted mb-4">
        Provide your shipment details and we will calculate the cost and send your payment slip.
      </p>

      <!-- FORM -->
      <input id="name" class="form-control mb-3" placeholder="Full Name" required>
      <input id="email" type="email" class="form-control mb-3" placeholder="Email" required>
      <input id="phone" class="form-control mb-3" placeholder="Phone Number" required>

      <select id="service" class="form-select mb-3" required>
        <option value="">Select Service</option>
        <option>Air Freight</option>
        <option>Sea Freight</option>
        <option>Road Freight</option>
      </select>

      <input id="weight" type="number" class="form-control mb-3" placeholder="Weight (kg)">
      <input id="destination" class="form-control mb-3" placeholder="Destination" required>

      <textarea id="note" class="form-control mb-3" placeholder="Extra Details"></textarea>

      <!-- BUTTON -->
      <button id="requestBtn" class="btn btn-primary w-100">
        <a href="https://wa.me/13864174481" target="_blank" class="btn btn-primary">
          Request Quote
        </a> </button>

      <!-- MESSAGE -->
      <p id="msg" class="text-center mt-3"></p>

    </div>
  </div>

  <script>

    const backendURL = "https://fastlaneshipping-backend-i4sw.onrender.com";
    const adminWhatsApp = "13864174481";

    const msg = document.getElementById("msg");
    const btnText = document.getElementById("btnText");

    function showError(message) {
      msg.innerText = message;
      msg.style.color = "red";
      btnText.innerText = "Request Quote";
    }

    document.getElementById("requestBtn").addEventListener("click", async () => {

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const service = document.getElementById("service").value;
      const weight = document.getElementById("weight").value.trim();
      const destination = document.getElementById("destination").value.trim();
      const note = document.getElementById("note").value.trim();

      // ---------------- VALIDATION FIRST ----------------
      if (!name) return showError("Name is required");
      if (!email) return showError("Email is required");
      if (!phone) return showError("Phone number is required");
      if (!service) return showError("Please select a service");
      if (!destination) return showError("Destination is required");

      // ---------------- LOADING AFTER VALIDATION ----------------
      btnText.innerText = "Sending...";
      msg.innerText = "Processing your request...";
      msg.style.color = "blue";

      try {

        const res = await fetch(`${backendURL}/request`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            email,
            phone,
            service,
            weight,
            destination,
            note
          })
        });

        const result = await res.json();

        if (!res.ok) throw new Error(result.message || "Request failed");

        msg.innerText = "Request sent successfully! Redirecting...";
        msg.style.color = "green";

        // ---------------- WHATSAPP MESSAGE ----------------
        const whatsappMessage = `
🚨 NEW SHIPMENT REQUEST

👤 Name: ${name}
📧 Email: ${email}
📞 Phone: ${phone}
🚚 Service: ${service}
⚖️ Weight: ${weight || "Not provided"} kg
📍 Destination: ${destination}
📝 Note: ${note || "None"}

👉 Please respond with payment details.
    `;

        const encodedMessage = encodeURIComponent(whatsappMessage);

        setTimeout(() => {
          window.location.href =
            `https://wa.me/${adminWhatsApp}?text=${encodedMessage}`;
        }, 1200);

      } catch (error) {
        console.error(error);
        msg.innerText = "Server error. Try again later.";
        msg.style.color = "red";
        btnText.innerText = "Request Quote";
      }

    });

  </script>





</body>

</html>
